name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # 官方推荐的 Pages 环境配置
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 使用专用的 Pages Artifact 上传工具（会自动处理 symlinks 问题）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 直接部署，不再需要手动下载 artifact
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4